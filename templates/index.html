<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe SK Mass Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .status-live-on { background: linear-gradient(135deg, #10b981, #059669); }
        .status-live-off { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .status-rate-limited { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .status-invalid { background: linear-gradient(135deg, #6b7280, #4b5563); }
        .status-expired { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        
        .glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); }
        
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent mb-4">
                <i class="fas fa-credit-card mr-3"></i>
                Stripe SK Mass Checker
            </h1>
            <p class="text-gray-400 text-lg">Check multiple Stripe secret keys simultaneously</p>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Input Section -->
            <div class="bg-gray-800 rounded-2xl p-6 glow">
                <h2 class="text-2xl font-bold mb-6 text-blue-400">
                    <i class="fas fa-key mr-2"></i>Check SK Keys
                </h2>
                
                <!-- Single Check -->
                <div class="mb-8">
                    <label class="block text-sm font-medium mb-2 text-gray-300">Single SK Check</label>
                    <div class="flex gap-2">
                        <input type="text" id="singleSk" placeholder="sk_live_..." 
                               class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500">
                        <button onclick="checkSingle()" class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-lg font-semibold transition-colors">
                            <i class="fas fa-search mr-2"></i>Check
                        </button>
                    </div>
                </div>

                <!-- Bulk Check -->
                <div>
                    <label class="block text-sm font-medium mb-2 text-gray-300">Bulk SK Check (One per line)</label>
                    <textarea id="bulkSks" rows="12" placeholder="sk_live_...
sk_live_...
sk_test_..." 
                             class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 font-mono text-sm"></textarea>
                    <div class="flex justify-between items-center mt-4">
                        <button onclick="checkBulk()" id="bulkCheckBtn" class="bg-purple-500 hover:bg-purple-600 px-6 py-3 rounded-lg font-semibold transition-colors">
                            <i class="fas fa-bolt mr-2"></i>Check All
                        </button>
                        <span id="keyCount" class="text-gray-400 text-sm">0 keys</span>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div id="progressSection" class="mt-6 hidden">
                    <div class="flex justify-between text-sm mb-2">
                        <span>Processing...</span>
                        <span id="progressText">0%</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-2">
                        <div id="progressBar" class="bg-green-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Results Section -->
            <div class="bg-gray-800 rounded-2xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-green-400">
                        <i class="fas fa-chart-bar mr-2"></i>Results
                    </h2>
                    <div class="text-sm text-gray-400">
                        <span id="resultCount">0</span> keys checked
                    </div>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
                    <div class="bg-gray-700 rounded-lg p-3 text-center">
                        <div class="text-green-400 font-bold text-xl" id="countLiveOn">0</div>
                        <div class="text-xs text-gray-400">Live [On]</div>
                    </div>
                    <div class="bg-gray-700 rounded-lg p-3 text-center">
                        <div class="text-yellow-400 font-bold text-xl" id="countLiveOff">0</div>
                        <div class="text-xs text-gray-400">Live [Off]</div>
                    </div>
                    <div class="bg-gray-700 rounded-lg p-3 text-center">
                        <div class="text-red-400 font-bold text-xl" id="countRateLimited">0</div>
                        <div class="text-xs text-gray-400">Rate Limited</div>
                    </div>
                    <div class="bg-gray-700 rounded-lg p-3 text-center">
                        <div class="text-gray-400 font-bold text-xl" id="countInvalid">0</div>
                        <div class="text-xs text-gray-400">Invalid</div>
                    </div>
                    <div class="bg-gray-700 rounded-lg p-3 text-center">
                        <div class="text-purple-400 font-bold text-xl" id="countExpired">0</div>
                        <div class="text-xs text-gray-400">Expired</div>
                    </div>
                </div>

                <!-- Results Container -->
                <div id="resultsContainer" class="space-y-4 max-h-96 overflow-y-auto">
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-inbox text-4xl mb-2"></i>
                        <p>No results yet. Check some SK keys!</p>
                    </div>
                </div>

                <!-- Export Buttons -->
                <div id="exportSection" class="mt-6 hidden">
                    <div class="flex gap-2">
                        <button onclick="exportResults('json')" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-lg transition-colors">
                            <i class="fas fa-download mr-2"></i>Export JSON
                        </button>
                        <button onclick="exportResults('csv')" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-lg transition-colors">
                            <i class="fas fa-file-csv mr-2"></i>Export CSV
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentJobId = null;
        let allResults = [];

        // Update key count
        document.getElementById('bulkSks').addEventListener('input', function() {
            const keys = this.value.split('\n').filter(k => k.trim());
            document.getElementById('keyCount').textContent = `${keys.length} keys`;
        });

        // Check single SK
        async function checkSingle() {
            const sk = document.getElementById('singleSk').value.trim();
            if (!sk) return alert('Please enter an SK key');

            const btn = document.querySelector('button[onclick="checkSingle()"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Checking...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/check-single', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sk })
                });
                
                const result = await response.json();
                allResults = [result];
                displayResults([result]);
                updateStats();
                
            } catch (error) {
                alert('Error checking SK key: ' + error.message);
            } finally {
                btn.innerHTML = '<i class="fas fa-search mr-2"></i>Check';
                btn.disabled = false;
            }
        }

        // Check bulk SKs
        async function checkBulk() {
            const skText = document.getElementById('bulkSks').value;
            const sks = skText.split('\n').filter(k => k.trim());
            if (sks.length === 0) return alert('Please enter at least one SK key');

            const btn = document.getElementById('bulkCheckBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Starting...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/check-bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sks })
                });
                
                const data = await response.json();
                currentJobId = data.job_id;
                
                document.getElementById('progressSection').classList.remove('hidden');
                monitorProgress();
                
            } catch (error) {
                alert('Error starting bulk check: ' + error.message);
                btn.innerHTML = '<i class="fas fa-bolt mr-2"></i>Check All';
                btn.disabled = false;
            }
        }

        // Monitor progress
        async function monitorProgress() {
            if (!currentJobId) return;

            try {
                const response = await fetch(`/api/check-progress/${currentJobId}`);
                const data = await response.json();
                
                const progress = data.progress || 0;
                document.getElementById('progressBar').style.width = `${progress}%`;
                document.getElementById('progressText').textContent = `${Math.round(progress)}%`;
                
                if (data.results) {
                    allResults = data.results;
                    displayResults(data.results);
                    updateStats();
                }
                
                if (progress < 100) {
                    setTimeout(monitorProgress, 1000);
                } else {
                    document.getElementById('progressSection').classList.add('hidden');
                    document.getElementById('bulkCheckBtn').innerHTML = '<i class="fas fa-bolt mr-2"></i>Check All';
                    document.getElementById('bulkCheckBtn').disabled = false;
                    document.getElementById('exportSection').classList.remove('hidden');
                }
                
            } catch (error) {
                console.error('Error monitoring progress:', error);
                setTimeout(monitorProgress, 2000);
            }
        }

        // Display results
        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            
            results.forEach(result => {
                const statusClass = getStatusClass(result.status);
                const card = document.createElement('div');
                card.className = `card-hover fade-in bg-gray-700 rounded-xl p-4 border-l-4 ${statusClass}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="font-semibold text-sm truncate flex-1 mr-2">${result.sk_key}</div>
                        <span class="px-2 py-1 rounded text-xs font-bold ${statusClass.replace('border-l-4', '')}">
                            ${result.status}
                        </span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-xs text-gray-300">
                        <div><span class="text-gray-500">PK:</span> ${result.pk_key.substring(0, 20)}...</div>
                        <div><span class="text-gray-500">Mode:</span> ${result.charge_mode}</div>
                        <div><span class="text-gray-500">Currency:</span> ${result.currency}</div>
                        <div><span class="text-gray-500">Balance:</span> ${formatCurrency(result.balance, result.currency)}</div>
                        <div><span class="text-gray-500">Pending:</span> ${formatCurrency(result.pending_balance, result.currency)}</div>
                        <div><span class="text-gray-500">URL:</span> ${result.url}</div>
                    </div>
                    ${result.error ? `<div class="mt-2 text-xs text-red-400"><i class="fas fa-exclamation-triangle mr-1"></i>${result.error}</div>` : ''}
                `;
                
                container.appendChild(card);
            });
            
            document.getElementById('resultCount').textContent = results.length;
        }

        // Update statistics
        function updateStats() {
            const stats = {
                'Live [Integration On]': 0,
                'Live [Integration Off]': 0,
                'Rate Limited': 0,
                'Invalid': 0,
                'Expired': 0
            };
            
            allResults.forEach(result => {
                stats[result.status] = (stats[result.status] || 0) + 1;
            });
            
            document.getElementById('countLiveOn').textContent = stats['Live [Integration On]'];
            document.getElementById('countLiveOff').textContent = stats['Live [Integration Off]'];
            document.getElementById('countRateLimited').textContent = stats['Rate Limited'];
            document.getElementById('countInvalid').textContent = stats['Invalid'];
            document.getElementById('countExpired').textContent = stats['Expired'];
        }

        // Get status class
        function getStatusClass(status) {
            const classes = {
                'Live [Integration On]': 'status-live-on border-l-green-500',
                'Live [Integration Off]': 'status-live-off border-l-yellow-500',
                'Rate Limited': 'status-rate-limited border-l-red-500',
                'Invalid': 'status-invalid border-l-gray-500',
                'Expired': 'status-expired border-l-purple-500'
            };
            return classes[status] || 'status-invalid border-l-gray-500';
        }

        // Format currency
        function formatCurrency(amount, currency) {
            const formatted = (amount / 100).toFixed(2);
            const symbols = { usd: '$', eur: '€', gbp: '£' };
            const symbol = symbols[currency?.toLowerCase()] || currency?.toUpperCase() + ' ';
            return symbol + formatted;
        }

        // Export results
        function exportResults(format) {
            if (allResults.length === 0) return alert('No results to export');
            
            let content, mimeType, filename;
            
            if (format === 'json') {
                content = JSON.stringify(allResults, null, 2);
                mimeType = 'application/json';
                filename = 'stripe_results.json';
            } else {
                // CSV
                const headers = ['Status', 'SK Key', 'PK Key', 'Charge Mode', 'Currency', 'Balance', 'Pending Balance', 'URL', 'Account Name', 'Error'];
                const csvRows = [headers.join(',')];
                
                allResults.forEach(result => {
                    const row = [
                        `"${result.status}"`,
                        `"${result.sk_key}"`,
                        `"${result.pk_key}"`,
                        `"${result.charge_mode}"`,
                        `"${result.currency}"`,
                        result.balance,
                        result.pending_balance,
                        `"${result.url}"`,
                        `"${result.account_name}"`,
                        `"${result.error || ''}"`
                    ];
                    csvRows.push(row.join(','));
                });
                
                content = csvRows.join('\n');
                mimeType = 'text/csv';
                filename = 'stripe_results.csv';
            }
            
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
